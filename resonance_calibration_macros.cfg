[gcode_macro CALIBRATE_RESONANCE_X]
description: Run resonance calibration for X axis and save PNG graph
gcode:
    RESPOND MSG="Starting X axis resonance calibration..."

    {% if 'x' not in printer.toolhead.homed_axes or 'y' not in printer.toolhead.homed_axes or 'z' not in printer.toolhead.homed_axes %}
        RESPOND MSG="Homing all axes first..."
        G28
    {% endif %}

    G90
    G1 X{printer.toolhead.axis_maximum.x / 2} Y{printer.toolhead.axis_maximum.y / 2} Z10 F6000

    RESPOND MSG="Running X axis resonance test..."
    TEST_RESONANCES AXIS=X OUTPUT=resonances NAME=x

    RESPOND MSG="Generating X axis resonance graph..."
    RUN_SHELL_COMMAND CMD=generate_resonance_graph_x

    RESPOND MSG="X axis calibration complete! Graph saved to printer_data/config/resonance_graphs/"

[gcode_macro CALIBRATE_RESONANCE_Y]
description: Run resonance calibration for Y axis and save PNG graph
gcode:
    RESPOND MSG="Starting Y axis resonance calibration..."

    {% if 'x' not in printer.toolhead.homed_axes or 'y' not in printer.toolhead.homed_axes or 'z' not in printer.toolhead.homed_axes %}
        RESPOND MSG="Homing all axes first..."
        G28
    {% endif %}

    G90
    G1 X{printer.toolhead.axis_maximum.x / 2} Y{printer.toolhead.axis_maximum.y / 2} Z10 F6000

    RESPOND MSG="Running Y axis resonance test..."
    TEST_RESONANCES AXIS=Y OUTPUT=resonances NAME=y

    RESPOND MSG="Generating Y axis resonance graph..."
    RUN_SHELL_COMMAND CMD=generate_resonance_graph_y

    RESPOND MSG="Y axis calibration complete! Graph saved to printer_data/config/resonance_graphs/"

[gcode_macro CALIBRATE_RESONANCE_BOTH]
description: Run resonance calibration for both X and Y axes
gcode:
    CALIBRATE_RESONANCE_X
    CALIBRATE_RESONANCE_Y
    RESPOND MSG="Both axes calibration complete!"
